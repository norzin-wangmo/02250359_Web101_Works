<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🌦️ Weather App</h1>

<!-- GET WEATHER -->
<div class="card">
  <h2>Get Weather (GET)</h2>
  <input type="text" id="city" placeholder="Enter city">
  <button onclick="getWeather()">Get Weather</button>
  <p id="weatherResult"></p>
</div>

<!-- SAVE LOCATION -->
<div class="card">
  <h2>Save Location (POST)</h2>
  <input type="text" id="locationName" placeholder="Location name">
  <button onclick="saveLocation()">Save</button>
</div>

<!-- SAVED LOCATIONS -->
<div class="card">
  <h2>Saved Locations (PUT & DELETE)</h2>
  <ul id="locationList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
